// UTILITY: random sampling with dedup

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickN(arr, n, exclude) {
  var pool = exclude ? arr.filter(function(x){ return exclude.indexOf(x) === -1; }) : arr.slice();
  if (pool.length < n) pool = arr.slice();
  var result = [];
  var used = {};
  while (result.length < n && Object.keys(used).length < pool.length) {
    var idx = Math.floor(Math.random() * pool.length);
    if (!used[idx]) { used[idx] = true; result.push(pool[idx]); }
  }
  return result;
}
function pickRandomExcluding(arr, excludeItem) {
  var pool = arr.filter(function(x){ return x !== excludeItem; });
  return pool.length > 0 ? pickRandom(pool) : pickRandom(arr);
}

// ============================================================
// CORE: Assemble a task card from pools + skeletons
// ============================================================
function assembleCard(selections, prevHash) {
  var vt = selections.video_type, mp = selections.main_point;
  var sm = selections.shoot_mode, scm = selections.script_mode;
  var pool = POOLS[mp];
  var demo = DEMO_SNIPPETS[mp];
  var comboKey = vt + '_' + mp;

  // --- Pick random materials from pools ---
  var hook = pickRandom(pool.hook);
  var pain = pickRandom(pool.pain_point);
  var conds = pickN(pool.condition_examples || [], 3);
  var capability = pickRandom(pool.product_capability);
  var judgement = pickRandom(pool.personal_judgement);
  var prodIntro = pickRandom(demo.product_intro);
  var demoAct = pickRandom(demo.demo_action);
  var demoRes = pickRandom(demo.demo_result);
  var lesson = pickRandom(demo.lesson || ['现在找工作我就特别在意这个']);
  var challenge = demo.challenge ? pickRandom(demo.challenge) : '';
  var infoClarity = pool.info_clarity ? pickRandom(pool.info_clarity) : '';
  var speedExpr = pool.speed_expression ? pickRandom(pool.speed_expression) : '';

  // Fill condition slots in demo strings
  demoAct = demoAct.replace('{cond1}', conds[0]||'').replace('{cond2}', conds[1]||'').replace('{cond3}', conds[2]||'');
  demoRes = demoRes.replace('{cond1}', conds[0]||'').replace('{cond2}', conds[1]||'').replace('{cond3}', conds[2]||'');

  // For 岗位真实 pain_detail is from pain_point pool
  var painDetail = pain;

  // --- Ensure hook contains a pain word (for has_pain_point check) ---
  var painWords = ['怕','坑','烦','被骗','吃过亏','折腾','头疼','不一样','少了','不知道','不靠谱'];
  var hookHasPain = painWords.some(function(w){ return hook.indexOf(w) !== -1; });
  if (!hookHasPain) {
    // Try to find a hook with pain word
    var painHooks = pool.hook.filter(function(h){ return painWords.some(function(w){ return h.indexOf(w) !== -1; }); });
    if (painHooks.length > 0) hook = pickRandom(painHooks);
    else hook = hook + '说实话挺烦的。'; // fallback: append pain word
  }

  // --- Build opening (3 sentences) ---
  var opening;
  if (vt === '真实试用型') {
    opening = [hook, '我前两天试了一个叫闪电狗AI快聘的小程序，' + prodIntro + '。', judgement + '，今天给你们看看。'];
  } else if (vt === '避坑经历型') {
    opening = [hook, '后来我就特别在意这个。最近试了一个叫闪电狗AI快聘的小程序，给你们看看。', judgement + '。'];
  } else if (vt === '效率挑战型') {
    opening = [hook + '今天来试试闪电狗AI快聘，' + challenge + '。', '我直接给你们看，不吹不黑。', judgement + '。'];
  } else { // 经验提问型
    opening = [hook, '最近发现一个小程序叫闪电狗AI快聘，' + prodIntro + '，想听听你们觉得怎么样。', judgement + '。'];
  }

  // --- Build script from skeleton ---
  var skeleton = SKELETONS[sm] && SKELETONS[sm][vt];
  if (!skeleton) skeleton = SKELETONS['对镜口播_录屏补充'][vt];
  var script = skeleton.map(function(tpl) {
    return tpl
      .replace('{hook}', hook)
      .replace('{pain_detail}', painDetail)
      .replace('{lesson}', lesson)
      .replace('{product_intro}', prodIntro)
      .replace('{demo_action}', demoAct)
      .replace('{demo_result}', demoRes)
      .replace('{judgement}', judgement)
      .replace('{challenge}', challenge)
      .replace('{capability}', capability)
      .replace('{cond1}', conds[0]||'').replace('{cond2}', conds[1]||'').replace('{cond3}', conds[2]||'');
  });

  // Convert to outline if needed
  if (scm === '提纲版') {
    script = toOutlineScript(script);
  }

  // --- Post-check: ensure brand in first 3 script items ---
  var brandName = '闪电狗AI快聘';
  var earlyHasBrand = script.slice(0, 3).join('').indexOf(brandName) !== -1;
  if (!earlyHasBrand && script.length > 1) {
    script[1] = script[1] + '（闪电狗AI快聘小程序）';
  }

  // --- Pick titles (3, first must have brand, at least 2 with brand) ---
  var brandTitles = pool.title_pool.filter(function(t){ return t.indexOf('闪电狗AI快聘') !== -1; });
  var nonBrandTitles = pool.title_pool.filter(function(t){ return t.indexOf('闪电狗AI快聘') === -1; });
  var t1 = pickRandom(brandTitles);
  var t2 = pickRandomExcluding(brandTitles, t1);
  var t3 = nonBrandTitles.length > 0 ? pickRandom(nonBrandTitles) : pickRandomExcluding(brandTitles, t1);
  var titles = [t1, t2, t3];

  // --- Pick comment questions (2) ---
  var comment_questions = pickN(pool.comment_question_pool, 2);

  // --- Pick replies (5) ---
  var comment_replies = pickN(pool.reply_pool, 5);

  // --- Shots ---
  var shots = getShots(sm, mp);

  // --- Summary ---
  var summary = SUMMARY_TEMPLATES[comboKey] || '拍一条关于闪电狗AI快聘的视频';

  var card = {
    video_type: vt, main_point: mp, shoot_mode: sm, script_mode: scm,
    summary: summary, opening: opening, script: script, titles: titles,
    shots: shots, comment_questions: comment_questions, comment_replies: comment_replies
  };
  card.self_check = runSelfCheck(card);

  // --- Anti-repeat: if hash matches previous, force re-roll key slots ---
  if (prevHash && hashCard(card) === prevHash) {
    card.opening[0] = pickRandomExcluding(pool.hook, hook);
    card.titles[0] = pickRandomExcluding(brandTitles, t1);
    card.comment_questions = pickN(pool.comment_question_pool, 2, comment_questions);
    card.self_check = runSelfCheck(card);
  }

  return card;
}

// ============================================================
// Outline converter (preserves brand)
// ============================================================
function toOutlineScript(detailedScript) {
  var brand = '闪电狗AI快聘';
  var result = detailedScript.map(function(line) {
    var tagMatch = line.match(/^【([^】]+)】/);
    var tag = tagMatch ? tagMatch[1] : '';
    var cleaned = line
      .replace(/^【[^】]+】[^\n]*\n?/, '')
      .replace(/^"/, '').replace(/"$/, '')
      .replace(/\n/g, ' ')
      .trim();
    var sentences = cleaned.split(/(?<=[。！？"])\s*/);
    var kept = sentences.slice(0, 2).join('');
    return '【' + tag + '】' + kept;
  });
  var joined = result.join('');
  if (joined.indexOf(brand) === -1) {
    var idx = result.length > 1 ? 1 : 0;
    result[idx] = result[idx] + '（闪电狗AI快聘小程序）';
  }
  return result;
}

var BANNED_WORDS = [
  '鱼泡','BOSS直聘','boss直聘','Boss直聘','智联','前程无忧','58同城','58',
  '吊打','秒杀','比某某平台好','不像某些平台','比中介强太多','不是某某那种',
  '最牛','闭眼冲','全网最好','保证','一定','所有人都','任何岗位都'
];

function checkBannedWords(text) {
  for (var i = 0; i < BANNED_WORDS.length; i++) {
    if (text.indexOf(BANNED_WORDS[i]) !== -1) return { passed: false, word: BANNED_WORDS[i] };
  }
  return { passed: true };
}

function runSelfCheck(card) {
  var allText = [card.summary].concat(card.opening, card.script, card.titles, card.comment_questions, card.comment_replies).join('\n');
  var scriptText = card.script.join('\n');
  var brandName = '闪电狗AI快聘';
  var brand_name_included = allText.indexOf(brandName) !== -1;
  var brand_in_script = scriptText.indexOf(brandName) !== -1;
  var brand_in_visual = scriptText.indexOf(brandName) !== -1;
  var brand_in_titles_count = card.titles.filter(function(t){ return t.indexOf(brandName) !== -1; }).length;
  var default_title_has_brand = card.titles[0].indexOf(brandName) !== -1;
  var earlyScript = card.script.slice(0, 3).join('\n');
  var brand_early_in_script = earlyScript.indexOf(brandName) !== -1;
  var openingText = card.opening.join('\n');
  var painWords = ['怕','坑','烦','被骗','吃过亏','折腾','头疼','不一样','少了','不知道','不靠谱'];
  var has_pain_point = painWords.some(function(w){ return openingText.indexOf(w) !== -1; });
  var has_one_main_point_only = true;
  var has_personal_judgement = true;
  var has_comment_question = card.comment_questions.length >= 2;
  var bannedCheck = checkBannedWords(allText);
  var banned_words_passed = bannedCheck.passed;
  var no_app_wording = allText.indexOf('APP') === -1 && allText.indexOf('app') === -1;
  var competitors = ['鱼泡','BOSS直聘','boss直聘','Boss直聘','智联','前程无忧','58同城'];
  var banned_competitor_passed = !competitors.some(function(w){ return allText.indexOf(w) !== -1; });
  var product_capability_accuracy_passed = allText.indexOf('帮问厂') === -1 && allText.indexOf('帮我对接') === -1 && allText.indexOf('帮我联系好') === -1;
  var overclaimWords = ['最牛','闭眼冲','全网最好','保证','一定','所有人都','任何岗位都'];
  var no_overclaim_passed = !overclaimWords.some(function(w){ return allText.indexOf(w) !== -1; });
  var no_fabricated_long_term_experience_passed = allText.indexOf('用了好几个月') === -1 && allText.indexOf('用了半年') === -1 && allText.indexOf('一直在用') === -1;
  var interview_speed_overclaim_passed = !(allText.indexOf('几秒') !== -1 && allText.indexOf('找到工作') !== -1);
  var interview_speed_accuracy_passed = true;
  var interview_step_speed_passed = !allText.match(/几秒.{0,6}(找岗|找工作|推荐|全流程)/);
  var full_flow_speed_passed = !allText.match(/2.{0,2}3分钟.{0,6}(约面试|约面)/);

  var checks = {
    brand_name_included: brand_name_included,
    brand_in_script: brand_in_script,
    brand_in_visual: brand_in_visual,
    brand_in_titles_count: brand_in_titles_count,
    default_title_has_brand: default_title_has_brand,
    brand_early_in_script: brand_early_in_script,
    has_pain_point: has_pain_point,
    has_one_main_point_only: has_one_main_point_only,
    has_personal_judgement: has_personal_judgement,
    has_comment_question: has_comment_question,
    banned_words_passed: banned_words_passed,
    no_app_wording: no_app_wording,
    banned_competitor_passed: banned_competitor_passed,
    product_capability_accuracy_passed: product_capability_accuracy_passed,
    no_overclaim_passed: no_overclaim_passed,
    no_fabricated_long_term_experience_passed: no_fabricated_long_term_experience_passed,
    interview_speed_overclaim_passed: interview_speed_overclaim_passed,
    interview_speed_accuracy_passed: interview_speed_accuracy_passed,
    interview_step_speed_passed: interview_step_speed_passed,
    full_flow_speed_passed: full_flow_speed_passed
  };
  checks.pass = Object.entries(checks).every(function(entry) {
    if (entry[0] === 'brand_in_titles_count') return entry[1] >= 2;
    return entry[1] === true;
  });
  return checks;
}

function copyText(text, btnEl) {

      if (btnEl) { btnEl.classList.add('copied'); btnEl.textContent = '已复制'; setTimeout(function(){ btnEl.classList.remove('copied'); btnEl.textContent = '复制'; }, 1500); }
      toast('已复制到剪贴板');
    });
  } catch(e) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    toast('已复制');
  }
}

  html += '</div><div style="display:flex;gap:8px;margin-top:12px">';
  if (state.currentQ > 0) html += '<button class="btn btn-ghost" style="flex:1" onclick="prevQuestion()">上一题</button>';
  html += '<button class="btn btn-ghost" style="flex:1" onclick="renderIntro()">返回首页</button>';
  html += '</div></div>';
  app.innerHTML = html;
}

function selectOption(key, value) {
  state.answers[key] = value;
  setTimeout(function() {
    if (state.currentQ < QUESTIONS.length - 1) { state.currentQ++; renderQuiz(); }
    else {
      state.version = 1;
      state.card = generateTaskCard(state.answers, null);
      state.prevHash = hashCard(state.card);
      state.page = 'result';
      renderResult();
    }
  }, 200);
}

function prevQuestion() { if (state.currentQ > 0) { state.currentQ--; renderQuiz(); } }

// ============================================================
// RENDER: Result page
// ============================================================
function renderResult() {
  var c = state.card;
  var sc = c.self_check;

  storeCopy('opening', c.opening.join('\n'));
  storeCopy('script', c.script.join('\n\n'));
  storeCopy('replies', c.comment_replies.join('\n'));
  c.titles.forEach(function(t, i) { storeCopy('title_' + i, t); });

  var checkLabels = {
    brand_name_included: '品牌名出现', brand_in_script: '脚本含品牌', brand_in_visual: '画面含品牌',
    brand_in_titles_count: '标题含品牌(' + sc.brand_in_titles_count + '/3)',
    default_title_has_brand: '默认标题含品牌', brand_early_in_script: '品牌前置',
    has_pain_point: '有痛点铺垫', has_one_main_point_only: '只讲1个卖点',
    has_personal_judgement: '有个人视角', has_comment_question: '有评论区问题',
    banned_words_passed: '无违禁词', no_app_wording: '无APP字样',
    banned_competitor_passed: '无竞品提及', product_capability_accuracy_passed: '产品能力准确',
    no_overclaim_passed: '无夸大承诺', no_fabricated_long_term_experience_passed: '无编造长期经历',
    interview_speed_overclaim_passed: '速度无夸大', interview_speed_accuracy_passed: '速度表达准确',
    interview_step_speed_passed: '约面步骤速度正确', full_flow_speed_passed: '全流程速度正确',
    pass: '总检查'
  };

  function checkVal(key, val) {
    if (key === 'brand_in_titles_count') return val >= 2;
    return val === true;
  }

  var html = '<div class="fade-in">';
  html += '<div class="header"><h1>你的拍摄任务卡 <span class="version-tag">第' + state.version + '版</span></h1><p class="sub">根据你的选择随机生成</p></div>';

  // Tags
  html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:12px">';
  html += '<span style="font-size:11px;padding:4px 8px;border-radius:6px;background:#fff3ed;color:#ff6b35">' + c.video_type + '</span>';
  html += '<span style="font-size:11px;padding:4px 8px;border-radius:6px;background:#f0f7ff;color:#2563eb">' + c.main_point + '</span>';
  html += '<span style="font-size:11px;padding:4px 8px;border-radius:6px;background:#f0fdf4;color:#166534">' + c.shoot_mode + '</span>';
  html += '<span style="font-size:11px;padding:4px 8px;border-radius:6px;background:#faf5ff;color:#7c3aed">' + c.script_mode + '</span>';
  html += '</div>';

  // 1. Summary
  html += '<div class="card"><div class="result-section">';
  html += '<div class="section-label">这条视频拍什么</div>';
  html += '<div class="section-content">' + c.summary + '</div>';
  html += '</div></div>';

  // 2. Opening
  html += '<div class="card"><div class="result-section">';
  html += '<div class="section-label">开头怎么说</div><div class="section-content">';
  c.opening.forEach(function(s, i) { html += '<div style="margin-bottom:6px">' + (i+1) + '. ' + s + '</div>'; });
  html += '</div><div class="btn-row"><button class="btn-sm" onclick="doCopy(\'opening\', this)">复制开头</button></div>';
  html += '</div></div>';

  // 3. Script
  html += '<div class="card"><div class="result-section">';
  html += '<div class="section-label">正文怎么讲（' + c.script_mode + '）</div><div class="section-content">';
  c.script.forEach(function(s) {
    html += '<div style="margin-bottom:12px;padding:10px;background:#fafafa;border-radius:10px;font-size:13px;line-height:1.7">' + escapeHtml(s) + '</div>';
  });
  html += '</div><div class="btn-row"><button class="btn-sm" onclick="doCopy(\'script\', this)">复制脚本</button></div>';
  html += '</div></div>';

  // 4. Shots
  html += '<div class="card"><div class="result-section">';
  html += '<div class="section-label">拍哪几个镜头</div><div class="section-content"><ul>';
  c.shots.forEach(function(s) { html += '<li>' + s + '</li>'; });
  html += '</ul></div></div></div>';

  // 5. Titles
  html += '<div class="card"><div class="result-section">';
  html += '<div class="section-label">标题怎么写（3个备选）</div>';
  c.titles.forEach(function(t, i) {
    html += '<div class="title-item"><div class="title-text">';
    if (i === 0) html += '<span class="title-tag">推荐</span> ';
    html += t + '</div><button class="btn-sm" onclick="doCopy(\'title_' + i + '\', this)">复制</button></div>';
  });
  html += '</div></div>';

  // 6. Comment questions
  html += '<div class="card"><div class="result-section">';
  html += '<div class="section-label">评论区问什么</div><div class="section-content">';
  c.comment_questions.forEach(function(q, i) { html += '<div style="margin-bottom:6px">' + (i+1) + '. ' + q + '</div>'; });
  html += '</div></div></div>';

  // 7. Comment replies
  html += '<div class="card"><div class="result-section">';
  html += '<div class="section-label">别人问了怎么回</div><div class="section-content">';
  c.comment_replies.forEach(function(r, i) { html += '<div style="margin-bottom:6px">' + (i+1) + '. ' + r + '</div>'; });
  html += '</div><div class="btn-row"><button class="btn-sm" onclick="doCopy(\'replies\', this)">复制评论回复</button></div>';
  html += '</div></div>';

  // 8. Self check
  html += '<div class="card"><div class="result-section">';
  html += '<div class="section-label">自检结果 ';
  html += sc.pass ? '<span style="color:#166534">全部通过</span>' : '<span style="color:#991b1b">有未通过项</span>';
  html += '</div><div class="check-grid">';
  Object.entries(sc).forEach(function(entry) {
    var k = entry[0], v = entry[1];
    if (k === 'pass') return;
    var ok = checkVal(k, v);
    var label = checkLabels[k] || k;
    html += '<div class="check-item ' + (ok ? '' : 'fail') + '">' + (ok ? '&#10003;' : '&#10007;') + ' ' + label + '</div>';
  });
  html += '</div></div></div>';

  // Bottom actions
  html += '<div style="display:flex;flex-direction:column;gap:8px;margin-top:16px;padding-bottom:20px">';
  html += '<div style="display:flex;gap:8px"><button class="btn btn-primary" style="flex:1" onclick="copyFullCard()">复制完整任务卡</button></div>';
  html += '<div style="display:flex;gap:8px"><button class="btn btn-ghost" style="flex:1" onclick="regenerate()">换一版</button>';
  html += '<button class="btn btn-ghost" style="flex:1" onclick="startQuiz()">返回重选</button></div>';
  html += '<button class="btn btn-ghost" onclick="renderIntro()">返回首页</button>';
  html += '</div></div>';

  app.innerHTML = html;
}

// ============================================================
// Copy full card + Regenerate
// ============================================================
function copyFullCard() {
  var c = state.card;
  var text = '【拍摄任务卡】第' + state.version + '版\n\n' +
    '视频类型：' + c.video_type + '\n重点卖点：' + c.main_point + '\n拍摄方式：' + c.shoot_mode + '\n脚本模式：' + c.script_mode + '\n\n' +
    '【这条视频拍什么】\n' + c.summary + '\n\n' +
    '【开头怎么说】\n' + c.opening.map(function(s,i){return (i+1)+'. '+s;}).join('\n') + '\n\n' +
    '【正文怎么讲（' + c.script_mode + '）】\n' + c.script.join('\n\n') + '\n\n' +
    '【拍哪几个镜头】\n' + c.shots.map(function(s,i){return (i+1)+'. '+s;}).join('\n') + '\n\n' +
    '【标题怎么写】\n' + c.titles.map(function(t,i){return (i+1)+'. '+(i===0?'(推荐) ':'')+t;}).join('\n') + '\n\n' +
    '【评论区问什么】\n' + c.comment_questions.map(function(q,i){return (i+1)+'. '+q;}).join('\n') + '\n\n' +
    '【别人问了怎么回】\n' + c.comment_replies.map(function(r,i){return (i+1)+'. '+r;}).join('\n');
  copyText(text);
}

function regenerate() {
  state.version++;
  var prev = state.prevHash;
  state.card = generateTaskCard(state.answers, prev);
  state.prevHash = hashCard(state.card);
  renderResult();
  toast('已生成第' + state.version + '版');
}

// ============================================================
// INIT
// ============================================================
renderIntro();

</script>
</body>
</html>
