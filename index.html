// ============================================================
// UTILITY: random sampling with dedup

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickN(arr, n, exclude) {
  if (!Array.isArray(arr) || arr.length === 0 || n <= 0) return [];
  var pool = exclude ? arr.filter(function(x){ return exclude.indexOf(x) === -1; }) : arr.slice();
  if (pool.length < n) pool = arr.slice();
  var result = [];
  var used = {};
  while (result.length < n && Object.keys(used).length < pool.length) {
    var idx = Math.floor(Math.random() * pool.length);
    if (!used[idx]) { used[idx] = true; result.push(pool[idx]); }
  }
  return result;
}
function pickRandomExcluding(arr, excludeItem) {
  var pool = arr.filter(function(x){ return x !== excludeItem; });
  return pool.length > 0 ? pickRandom(pool) : pickRandom(arr);

function getVideoTypeReaction(videoType, theme) {
  var byVideoType = video_type_reaction_pool[videoType] || video_type_reaction_pool['真实试用型'];
  var pool = byVideoType[theme] || byVideoType.info_clarity || [];
  return pool.length ? pickRandom(pool) : '';
}

function mergeNarrativeLines(primary, secondary) {
  var left = String(primary || '').trim().replace(/[。！？]+$/g, '');
  var right = String(secondary || '').trim();
  if (!left) return right;
  if (!right) return left + '。';
  var combinedLength = left.length + right.length;
  var shouldSplit = combinedLength > 45 || /^(反正|诶|说真的|说实话|我本来|我比较|让我|起码|至少|我后面|后面)/.test(right);
  return shouldSplit ? left + '。' + right : left + '，' + right;
}

function getLeadingDiscourseMarker(text) {
  var match = String(text || '').trim().match(/^(反正|说真的|说实话|怎么说呢|诶)[，,]?/);
  return match ? match[1] : '';
}

function removeLeadingDiscourseMarker(text) {
  return String(text || '').trim().replace(/^(反正|说真的|说实话|怎么说呢|诶)[，,]?/, '').trim();
}

function dedupeAdjacentDiscourseMarkers(lines) {
  return (lines || []).map(function(line, idx, arr) {
    if (idx === 0) return line;
    var prevMarker = getLeadingDiscourseMarker(arr[idx - 1]);
    var currMarker = getLeadingDiscourseMarker(line);
    if (!prevMarker || !currMarker || prevMarker !== currMarker) return line;
    return removeLeadingDiscourseMarker(line);
  });
}

function flattenTitlePoolByTheme(pool) {
  if (Array.isArray(pool)) return pool.slice();
  return Object.keys(pool).reduce(function(acc, key) { return acc.concat(pool[key]); }, []);
}

function fillBridgeTemplate(text, context) {
  return text.replace(/\{page\}/g, context.pageSource || '职位详情页');
}

function pickBridgeIntro(theme, context) {
  var pool = bridge_intro_pool[theme] || bridge_intro_pool.info_clarity;
  return fillBridgeTemplate(pickRandom(pool), context);
}

function scriptMentionsCapability(text) {
  return brand_anchor_rules.capability_terms.some(function(term) {
    return String(text || '').indexOf(term) !== -1;
  });
}

function checkBrandAnchorBeforeCapability(card) {
  var brandName = brand_anchor_rules.brand_name;
  var shortBrand = brandName.replace(/小程序/g, '');
  var scriptLines = (card.script_full || card.script || []).slice();
  var bodyText = scriptLines.join('\n');
  if (!scriptMentionsCapability(bodyText)) return true;
  var firstTwoBodyLines = scriptLines.slice(0, 2).join('\n');
  return firstTwoBodyLines.indexOf(brandName) !== -1 || firstTwoBodyLines.indexOf(shortBrand) !== -1;
}

function getStoryFrame(videoType, theme) {
  var byVideoType = video_type_story_pool[videoType] || video_type_story_pool['真实试用型'];
  return byVideoType[theme] || video_type_story_pool['真实试用型'][theme] || {};
}

function getTriggerLine(theme) {
  var pool = trigger_pool[theme] || trigger_pool.info_clarity;
  return pickRandom(pool);
}

function buildThemeScript(theme, selections, context) {
  if (selections.script_mode === '提纲版') {
    return buildThemeOutline(theme, selections, context);
  }
  var journey = experience_journey_pool[theme] || experience_journey_pool.info_clarity;
  var evidence = supporting_evidence_pool[theme] || supporting_evidence_pool.info_clarity;
  var storyFrame = getStoryFrame(selections.video_type, theme);
  var lines = [];

  var triggerLine = getTriggerLine(theme);
  var introLine = pickRandom(storyFrame.intro || journey.intro);
  var actionLine = pickRandom(storyFrame.action || journey.action);
  if (theme === 'ai_recommendation') {
    actionLine = actionLine.replace('{condText}', context.condText);
  }
  var evidencePool = evidence.slice();
  if (theme === 'interview_speed' && !context.includeMessageNotification) {
    evidencePool = evidencePool.filter(function(line) { return line.indexOf('消息通知页') === -1; });
  }
  if (!evidencePool.length) evidencePool = evidence.slice();
  var evidenceLine = pickRandom(evidencePool);
  var proofLine = pickRandom(theme_proof_pool[theme] || theme_proof_pool.info_clarity);
  var mergedEvidenceLine = mergeNarrativeLines(evidenceLine, proofLine);
  var reactionLine = getVideoTypeReaction(selections.video_type, theme);
  var judgementLine = pickRandom(journey.judgement);
  var recommendLine = pickRandom(journey.recommend);

  lines.push(triggerLine);
  lines.push(introLine);
  lines.push(actionLine);
  if (reactionLine) lines.push(reactionLine);
  lines.push(mergedEvidenceLine);
  lines.push(judgementLine);
  lines.push(recommendLine);
  if (selections.script_mode === '逐句版') lines.push(pickRandom(journey.close));
  return dedupeAdjacentDiscourseMarkers(lines);
}

function buildThemeShots(theme, selections, context) {
  var shots = getShots(selections.shoot_mode, selections.main_point);
  if (theme === 'interview_speed' && context.includeMessageNotification) {
    var extraShot = '镜头' + shots.length + '：手机画面补拍消息通知页，展示约面结果或提醒';
    shots.splice(Math.max(shots.length - 1, 1), 0, extraShot);
  }
  return withShotDurations(shots);
}

function detectThemeFromTitle(title) {
  var text = String(title || '');
  if (/(工资|薪资)/.test(title)) return 'salary';
  if (/(包吃包住|福利|宿舍|岗位特点|环境)/.test(title)) return 'benefits';
  if (/(体检费|体检要求|体检查什么)/.test(title)) return 'medical_fee';
  if (/(约面|全流程.*分钟|几秒.*约|选好岗位后)/.test(text)) return 'interview_speed';
  if (/(面试|入职)/.test(text) && !/(约面|几秒|2、3分钟|2-3分钟|全流程.*分钟|选好岗位后)/.test(text)) return 'interview_info';
  if (/(离职条件|离职)/.test(title)) return 'resignation';
  if (/(条件推荐|AI.*推荐|不用自己翻岗位)/.test(title)) return 'ai_recommendation';
  return 'info_clarity';
}

function injectNaturalBrand(line, brandName) {
  var text = String(line || '').trim();
  if (!text || !brandName) return text;
  if (text.indexOf(brandName) !== -1) return text;
  var bareBrand = String(brandName || '').replace(/小程序/g, '');
  if (bareBrand && text.indexOf(bareBrand) !== -1) {
    return text.replace(bareBrand, brandName);
  }
  if (text.indexOf('这个小程序') !== -1) {
    return text.replace('这个小程序', '这个' + brandName);
  }
  if (text.indexOf('有个小程序') !== -1) {
    return text.replace('有个小程序', '有个叫' + brandName + '的');
  }
  if (text.indexOf('一个小程序') !== -1) {
    return text.replace('一个小程序', '一个叫' + brandName + '的');
  }
  if (text.indexOf('小程序') !== -1) {
    return text.replace('小程序', brandName);
  }
  if (/[。！？]$/.test(text)) {
    return text.replace(/[。！？]$/, '，所以我就顺手试了试' + brandName + '。');
  }
  return text + '，所以我就顺手试了试' + brandName;
}

function ensureEarlyBrand(lines, brandName, limit) {
  var arr = (lines || []).slice();
  var earlyText = arr.slice(0, limit || 2).join('\n');
  var bareBrand = String(brandName || '').replace(/小程序/g, '');
  if (earlyText.indexOf(brandName) !== -1 || (bareBrand && earlyText.indexOf(bareBrand) !== -1)) return arr;
  if (arr.length > 1) {
    arr[1] = injectNaturalBrand(arr[1], brandName);
  } else if (arr.length === 1) {
    arr[0] = injectNaturalBrand(arr[0], brandName);
  }
  return arr;
}

function assembleCard(selections, prevHash) {
  var vt = selections.video_type, mp = selections.main_point;
  var sm = selections.shoot_mode, scm = selections.script_mode;
  var pool = POOLS[mp];
  var comboKey = vt + '_' + mp;
  var theme = chooseTheme(mp);
  var themedTitles = (THEMED_TITLE_POOLS[mp] && THEMED_TITLE_POOLS[mp][theme]) || flattenTitlePoolByTheme(THEMED_TITLE_POOLS[mp] || {});

  // --- Pick random materials from pools ---
  var hook = pickRandom(pool.hook);
  var pain = pickRandom(pool.pain_point);
  var conds = pickN(pool.condition_examples || [], 3);
  var capability = pickRandom(pool.product_capability);
  var judgement = pickRandom(pool.personal_judgement);
  var pageSource = pickPageSource(theme);
  var includeMessageNotification = theme === 'interview_speed' ? Math.random() > 0.5 : false;
  var condText = conds.join('、');

  // --- Ensure hook contains a pain word (for has_pain_point check) ---
  var painWords = ['怕','坑','烦','被骗','吃过亏','折腾','头疼','不一样','少了','不知道','不靠谱'];
  var hookHasPain = painWords.some(function(w){ return hook.indexOf(w) !== -1; });
  if (!hookHasPain) {
    // Try to find a hook with pain word
    var painHooks = pool.hook.filter(function(h){ return painWords.some(function(w){ return h.indexOf(w) !== -1; }); });
    if (painHooks.length > 0) hook = pickRandom(painHooks);
    else hook = hook + '说实话挺烦的。'; // fallback: append pain word
  }

  // --- Build opening hook options (3 candidates, only for first 1-2 lines) ---
  var openingSource = pool.hook;
  var opening = [hook].concat(pickN(pool.hook, 2, [hook]));
  var detailedSelections = Object.assign({}, selections, { script_mode: '逐句版' });
  var scriptFull = buildThemeScript(theme, detailedSelections, {
    judgement: judgement,
    pageSource: pageSource,
    condText: condText,
    includeMessageNotification: includeMessageNotification
  });
  var script = scm === '提纲版' ? buildThemeScript(theme, selections, {
    judgement: judgement,
    pageSource: pageSource,
    condText: condText,
    includeMessageNotification: includeMessageNotification
  }) : scriptFull.slice();
  scriptFull = ensureEarlyBrand(scriptFull, '闪电狗AI快聘小程序', 2);
  script = ensureEarlyBrand(script, '闪电狗AI快聘小程序', 2);

  // --- Post-check: ensure brand in first 3 script items ---
  var brandName = '闪电狗AI快聘';
  var earlyHasBrand = script.slice(0, 3).join('').indexOf(brandName) !== -1;
  if (!earlyHasBrand && script.length > 1) {
    script[1] = script[1] + '（闪电狗AI快聘小程序）';
  }

  // --- Pick titles (3, first has brand, later titles prefer non-brand) ---
  var brandTitles = themedTitles.filter(function(t){ return t.indexOf('闪电狗AI快聘') !== -1; });
  var nonBrandTitles = themedTitles.filter(function(t){ return t.indexOf('闪电狗AI快聘') === -1; });
  var t1 = brandTitles.length > 0 ? pickRandom(brandTitles) : pickRandom(themedTitles);
  var t2 = nonBrandTitles.length > 0 ? pickRandom(nonBrandTitles) : pickRandomExcluding(themedTitles, t1);
  var t3Source = nonBrandTitles.filter(function(t) { return t !== t2; });
  var t3 = t3Source.length > 0
    ? pickRandom(t3Source)
    : pickRandomExcluding(themedTitles.filter(function(t) { return t !== t2; }), t1);
  var titles = [t1, t2, t3];

  // --- Pick comment questions (2) ---
  var comment_questions = pickN(pool.comment_question_pool, 2);

  // --- Pick replies (5) ---
  var comment_replies = pickN(pool.reply_pool, 5);

  // --- Shots ---
  var shots = buildThemeShots(theme, selections, {
    pageSource: pageSource,
    condText: condText,
    includeMessageNotification: includeMessageNotification
  });

  // --- Summary ---
  var summary = SUMMARY_TEMPLATES[comboKey] || '拍一条关于闪电狗AI快聘的视频';
  var recommendedDuration = getRecommendedDuration(vt);

  var card = {
    video_type: vt, main_point: mp, shoot_mode: sm, script_mode: scm,
    summary: summary, opening: opening, script: script, titles: titles,
    shots: shots, comment_questions: comment_questions, comment_replies: comment_replies,
    recommended_duration: recommendedDuration,
    script_full: scriptFull,
    theme: theme,
    page_source: pageSource,
    include_message_notification: includeMessageNotification,
    internal_rules: {
      theme_consistency_rules: theme_consistency_rules,
      page_alignment_rules: page_alignment_rules,
      brand_anchor_rules: brand_anchor_rules,
      douyin_safe_rules: {
        strict_banned_patterns: STRICT_BANNED_PATTERNS,
        soft_rewrite_rules: SOFT_REWRITE_RULES
      },
      front_view_clean_rules: front_view_clean_rules
    }
  };
  card = applyDouyinSafetyLayer(card);
  card.creator_task_view = buildCreatorTaskView(card);
  card.self_check = runSelfCheck(card);

  // --- Anti-repeat: if hash matches previous, force re-roll key slots ---
  if (prevHash && hashCard(card) === prevHash) {
    card.opening = pickN(openingSource, 3, opening);
    card.titles[0] = pickRandomExcluding(brandTitles, t1);
    card.comment_questions = pickN(pool.comment_question_pool, 2, comment_questions);
    card.script_full = buildThemeScript(theme, detailedSelections, {
      judgement: judgement,
      pageSource: pageSource,
      condText: condText,
      includeMessageNotification: includeMessageNotification
    });
    card.script = scm === '提纲版' ? buildThemeScript(theme, selections, {
      judgement: judgement,
      pageSource: pageSource,
      condText: condText,
      includeMessageNotification: includeMessageNotification
    }) : card.script_full.slice();
    card.shots = buildThemeShots(theme, selections, {
      pageSource: pageSource,
      condText: condText,
      includeMessageNotification: includeMessageNotification
    });
    card = applyDouyinSafetyLayer(card);
    card.creator_task_view = buildCreatorTaskView(card);
    card.self_check = runSelfCheck(card);
  }

  return card;
}

  var labels = ['接着开头', '继续往下讲', '重点信息', '最后一句'];
  var result = detailedScript.map(function(line, idx) {

    return '【' + (labels[idx] || '正文') + '】' + kept;

    var idx = result.length > 1 ? 1 : 0;

function normalizeForSafety(text) {
  return String(text || '')
    .toLowerCase()
    .replace(/[！!@#￥$%^&*()（）_\-+=\[\]{}|\\:;"'“”‘’<>,.，。？?、\/`~·…\s]/g, '')
    .replace(/微[xx]/g, '微信')
    .replace(/v信/g, '微信')
    .replace(/boss/g, 'boss')
    .replace(/offer/g, 'offer');
}

function textMatchesPatterns(text, patterns) {
  var raw = String(text || '');
  var normalized = normalizeForSafety(raw);
  for (var i = 0; i < patterns.length; i++) {
    if (patterns[i].test(raw) || patterns[i].test(normalized)) return true;
  }
  return false;
}

function findStrictBannedTerm(text) {
  var sanitized = String(text || '').replace(/微信小程序搜闪电狗AI快聘/g, '站内搜索品牌名');
  var categories = Object.keys(STRICT_BANNED_PATTERNS);
  for (var i = 0; i < categories.length; i++) {
    var key = categories[i];
    var patterns = STRICT_BANNED_PATTERNS[key];
    for (var j = 0; j < patterns.length; j++) {
      if (textMatchesPatterns(sanitized, [patterns[j]])) {
        return { passed: false, category: key, pattern: patterns[j].toString() };
      }
    }
  }
  if (/(^|[^0-9])58([^0-9]|$)/.test(sanitized)) {
    return { passed: false, category: 'competitor', pattern: '/58/' };
  }
  return { passed: true };
}

function rewriteSoftSafetyText(text) {
  var original = String(text || '');
  var rewritten = original;
  SOFT_REWRITE_RULES.forEach(function(rule) {
    rule.patterns.forEach(function(pattern) {
      rewritten = rewritten.replace(pattern, rule.replacement);
    });
  });
  rewritten = rewritten
    .replace(/几秒全流程/g, '从说条件到约好面试，全流程2、3分钟')
    .replace(/几秒就搞定找工作/g, '选好岗位后，约面试这一步很快')
    .replace(/工资高到离谱/g, '薪资写得比较明白')
    .replace(/到手肯定没问题/g, '我会先看页面上写的薪资构成')
    .replace(/绝对/g, '比较')
    .replace(/肯定/g, '我这次看下来')
    .replace(/最稳/g, '相对更想先看清楚')
    .replace(/冲就完了/g, '我会先把页面信息看清楚')
    .replace(/暴富/g, '薪资范围');
  return {
    text: rewritten,
    changed: rewritten !== original
  };
}

function rewriteStrictSafetyText(text) {
  var original = String(text || '');
  var rewritten = original.replace(/微信小程序搜闪电狗AI快聘/g, '__WX_MINI_SEARCH__');

    .replace(/微信搜[^，。！？\n]*/g, '直接在对应页面里继续看')
    .replace(/微信/g, '平台内')
    .replace(/加v|加微|私聊我|扫码|拉群|主页找我|第三方平台|站外聊|私下交易/g, '留在页面里继续看')

    .replace(/(^|[^0-9])58([^0-9]|$)/g, '$1别的平台$2')
    .replace(/比某某平台好|不像某些平台|吊打|秒杀/g, '更想先把页面信息看清楚')
    .replace(/最牛|最好|全网第一|闭眼冲|百分百|100%|包进|包过|稳过|谁用谁上岸/g, '更想先看清楚')

    .replace(/一定能|一定会|一定过|一定上/g, '这次看下来')

    text: rewritten,
    changed: rewritten !== original
  };
}

function detectVariantBypass(text) {
  var raw = String(text || '').replace(/微信小程序搜闪电狗AI快聘/g, '站内搜索品牌名');
  var normalized = normalizeForSafety(raw);
  return /微.{0,2}信|保.{0,2}证|稳.{0,2}稳.{0,2}的|点.{0,2}主.{0,2}页|评.{0,2}论.{0,2}区.{0,2}打.{0,2}1/.test(raw) ||
    /微信|保证|稳稳的|点主页|评论区打1/.test(normalized);
}

function assessRiskLevel(text) {
  if (!text) return 'low';
  if (!findStrictBannedTerm(text).passed) return 'high';
  for (var i = 0; i < SOFT_REWRITE_RULES.length; i++) {
    if (textMatchesPatterns(text, SOFT_REWRITE_RULES[i].patterns)) return 'medium';
  }
  return 'low';
}

function sanitizeContentList(list) {
  var rewriteApplied = false;
  var riskList = [];
  var safeList = (list || []).map(function(item) {
    var strictRewritten = rewriteStrictSafetyText(item);
    var softRewritten = rewriteSoftSafetyText(strictRewritten.text);
    rewriteApplied = rewriteApplied || strictRewritten.changed || softRewritten.changed;
    riskList.push(assessRiskLevel(softRewritten.text));
    return softRewritten.text;
  });
  return {
    list: safeList,
    risk: riskList,
    rewriteApplied: rewriteApplied
  };
}

function applyDouyinSafetyLayer(card) {
  var titlesSafe = sanitizeContentList(card.titles);
  var openingSafe = sanitizeContentList(card.opening);
  var scriptFullSafe = sanitizeContentList(card.script_full || card.script);
  var scriptSafe = sanitizeContentList(card.script);
  var commentSafe = sanitizeContentList(card.comment_questions);
  var replySafe = sanitizeContentList(card.comment_replies);
  var shotsSafe = sanitizeContentList(card.shots);

  card.titles = titlesSafe.list;
  card.opening = openingSafe.list;
  card.script_full = scriptFullSafe.list;
  card.script = scriptSafe.list;
  card.comment_questions = commentSafe.list;
  card.comment_replies = replySafe.list;
  card.shots = shotsSafe.list;
  card.risk_level = {
    titles: titlesSafe.risk,
    opening: openingSafe.risk,
    script: scriptSafe.risk,
    script_full: scriptFullSafe.risk,
    comment_questions: commentSafe.risk,
    comment_replies: replySafe.risk,
    shots: shotsSafe.risk
  };
  card.safe_rewrite_applied =
    titlesSafe.rewriteApplied ||
    openingSafe.rewriteApplied ||
    scriptFullSafe.rewriteApplied ||
    scriptSafe.rewriteApplied ||
    commentSafe.rewriteApplied ||
    replySafe.rewriteApplied ||
    shotsSafe.rewriteApplied;
  return card;
}

function cleanFrontSpokenLine(text) {

  return cleaned;
}

function cleanFrontShotLine(text) {
  var cleaned = String(text || '').trim();
  cleaned = cleaned.replace(/，先说你选中的开头句/g, '');

  return cleaned;
}

function isFrontViewCleanText(text) {
  var value = String(text || '').trim();
  return !front_view_clean_rules.banned_patterns.some(function(pattern) {
    return pattern.test(value);
  });
}

function buildCreatorTaskView(card) {
  var themeJudgements = judgement_rewrite_pool[card.theme] || judgement_rewrite_pool.info_clarity;
  var spokenScript = (card.script || [])
    .map(cleanFrontSpokenLine)
    .filter(Boolean)
    .filter(isFrontViewCleanText);
  if (spokenScript.length < 2) {
    spokenScript = spokenScript.concat(themeJudgements).filter(isFrontViewCleanText).slice(0, 3);
  }
  var view = {
    summary: String(card.summary || '').trim(),
    recommended_duration: String(card.recommended_duration || '').trim(),
    opening: (card.opening || []).map(cleanFrontSpokenLine).filter(Boolean).filter(isFrontViewCleanText),
    script: spokenScript,
    shots: (card.shots || []).map(cleanFrontShotLine).filter(Boolean).filter(isFrontViewCleanText),
    titles: (card.titles || []).map(function(text) { return String(text || '').trim(); }).filter(Boolean).filter(isFrontViewCleanText),
    comment_questions: (card.comment_questions || []).map(function(text) { return String(text || '').trim(); }).filter(Boolean).filter(isFrontViewCleanText),
    comment_replies: (card.comment_replies || []).map(function(text) { return String(text || '').trim(); }).filter(Boolean).filter(isFrontViewCleanText)
  };
  return view;
}

function checkFrontViewClean(card) {
  var v = card.creator_task_view || buildCreatorTaskView(card);
  var texts = [v.summary, v.recommended_duration]
    .concat(v.opening, v.script, v.shots, v.titles, v.comment_questions, v.comment_replies);
  return texts.every(isFrontViewCleanText);
}

function checkSpokenVsShotSeparation(card) {
  var v = card.creator_task_view || buildCreatorTaskView(card);
  var spokenOk = v.script.every(function(text) {
    return isFrontViewCleanText(text) &&
      !front_view_clean_rules.shot_only_patterns.some(function(pattern) { return pattern.test(text); });
  });
  var shotsOk = v.shots.every(function(text) {
    return isFrontViewCleanText(text) &&
      !front_view_clean_rules.spoken_only_patterns.some(function(pattern) { return pattern.test(text); });
  });
  return spokenOk && shotsOk;
}

  var title_structure_passed = checkTitleStructure(card);
  var main_point_vs_evidence_balance_passed = checkMainPointVsEvidenceBalance(card);
  var front_view_clean_passed = checkFrontViewClean(card);
  var spoken_vs_shot_separation_passed = checkSpokenVsShotSeparation(card);
  var page_consistency_passed = title_script_shot_consistency_passed;
  var variant_bypass_passed = !detectVariantBypass(allText);
  var soft_rewrite_passed = !SOFT_REWRITE_RULES.some(function(rule) {
    return textMatchesPatterns(allText, rule.patterns);
  });
  var banned_terms_passed = bannedCheck.passed;
  var douyin_safety_passed = banned_terms_passed && soft_rewrite_passed && page_consistency_passed && variant_bypass_passed && brand_anchor_before_capability_passed && spoken_line_natural_passed && title_structure_passed && main_point_vs_evidence_balance_passed && front_view_clean_passed && spoken_vs_shot_separation_passed;

  var checks = {
    brand_name_included: brand_name_included,
    brand_in_script: brand_in_script,
    brand_in_visual: brand_in_visual,
    brand_in_titles_count: brand_in_titles_count,
    default_title_has_brand: default_title_has_brand,
    brand_early_in_script: brand_early_in_script,
    has_pain_point: has_pain_point,
    has_one_main_point_only: has_one_main_point_only,
    has_personal_judgement: has_personal_judgement,
    has_comment_question: has_comment_question,
    banned_words_passed: banned_words_passed,
    no_app_wording: no_app_wording,
    banned_competitor_passed: banned_competitor_passed,
    product_capability_accuracy_passed: product_capability_accuracy_passed,
    no_overclaim_passed: no_overclaim_passed,
    no_fabricated_long_term_experience_passed: no_fabricated_long_term_experience_passed,
    interview_speed_overclaim_passed: interview_speed_overclaim_passed,
    interview_speed_accuracy_passed: interview_speed_accuracy_passed,
    interview_step_speed_passed: interview_step_speed_passed,
    full_flow_speed_passed: full_flow_speed_passed,
    title_script_shot_consistency_passed: title_script_shot_consistency_passed,
    brand_anchor_before_capability_passed: brand_anchor_before_capability_passed,
    spoken_line_natural_passed: spoken_line_natural_passed,
    title_structure_passed: title_structure_passed,
    main_point_vs_evidence_balance_passed: main_point_vs_evidence_balance_passed,
    front_view_clean_passed: front_view_clean_passed,
    spoken_vs_shot_separation_passed: spoken_vs_shot_separation_passed,
    banned_terms_passed: banned_terms_passed,
    soft_rewrite_passed: soft_rewrite_passed,
    page_consistency_passed: page_consistency_passed,
    variant_bypass_passed: variant_bypass_passed,
    douyin_safety_passed: douyin_safety_passed
  };
  checks.pass = Object.entries(checks).every(function(entry) {
    if (entry[0] === 'brand_in_titles_count') return entry[1] >= 1;
    if (entry[0] === 'title_structure_passed') return entry[1] === true;
    return entry[1] === true;
  });
  return checks;
}

// ============================================================
// PUBLIC API: generateTaskCard
// ============================================================
function generateTaskCard(selections, prevHash) {
  return assembleCard(selections, prevHash);
}

function getAllSelectionCombos() {
  var optionValues = QUESTIONS.map(function(question) {
    return question.options.map(function(option) { return option.value; });
  });
  var combos = [];
  function walk(index, current) {
    if (index >= QUESTIONS.length) {
      combos.push(Object.assign({}, current));
      return;
    }
    var question = QUESTIONS[index];
    optionValues[index].forEach(function(value) {
      current[question.key] = value;
      walk(index + 1, current);
    });
  }
  walk(0, {});
  return combos;
}

function listFailedCheckKeys(checks) {
  var failed = [];
  Object.keys(checks || {}).forEach(function(key) {
    if (key === 'pass') return;
    if (key === 'brand_in_titles_count') {
      if ((checks[key] || 0) < 1) failed.push(key);
      return;
    }
    if (checks[key] !== true) failed.push(key);
  });
  return failed;
}

function runCombinationValidation(samplePerCombo, options) {
  var iterations = Math.max(1, Number(samplePerCombo) || 10);
  var config = options || {};
  var maxFailuresPerCombo = config.max_failures_per_combo;
  if (!(maxFailuresPerCombo > 0)) maxFailuresPerCombo = iterations;
  var combos = getAllSelectionCombos();
  var summary = {
    checked_at: new Date().toISOString(),
    combo_count: combos.length,
    sample_per_combo: iterations,
    max_failures_per_combo: maxFailuresPerCombo,
    total_runs: 0,
    failed_runs: 0,
    failed_combos: [],
    pass: true
  };

  combos.forEach(function(selections) {
    var comboFailures = 0;
    for (var i = 0; i < iterations; i++) {
      summary.total_runs++;
      var card = generateTaskCard(selections, null);
      if (!card.self_check || !card.self_check.pass) {
        comboFailures++;
        summary.failed_runs++;
        summary.pass = false;
        summary.failed_combos.push({
          selections: Object.assign({}, selections),
          iteration: i + 1,
          failed_checks: listFailedCheckKeys(card.self_check || {}),
          titles: (card.titles || []).slice(0, 3),
          script_preview: (card.script_full || card.script || []).slice(0, 4),
          shots: (card.shots || []).slice(0, 4)
        });
        if (comboFailures >= maxFailuresPerCombo) break;
      }
    }
  });

  return summary;
}

if (typeof window !== 'undefined') {
  window.generateTaskCard = generateTaskCard;
  window.runCombinationValidation = runCombinationValidation;
}

// ============================================================
// APP STATE & RENDERING
// ============================================================
var state = {
  page: 'intro',
  currentQ: 0,
  answers: {},
  card: null,
  prevHash: null,
  version: 0
};

var app = document.getElementById('app');

function toast(msg) {
  var el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); }, 1800);
}

function copyText(text, btnEl) {
  function markCopied() {
    if (btnEl) {
      btnEl.classList.add('copied');
      btnEl.textContent = '已复制';
      setTimeout(function(){ btnEl.classList.remove('copied'); btnEl.textContent = '复制'; }, 1500);
    }
  }
  function fallbackCopy() {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
    markCopied();
    toast('已复制');
  }
  try {
    if (!navigator.clipboard || typeof navigator.clipboard.writeText !== 'function') {
      fallbackCopy();
      return;
    }
    navigator.clipboard.writeText(text).then(function(){
      markCopied();
      toast('已复制到剪贴板');
    }).catch(function() {
      fallbackCopy();
    });
  } catch(e) {
    fallbackCopy();
  }
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;')
    .replace(/\n/g,'<br>');
}

var _copyStore = {};
function storeCopy(key, text) { _copyStore[key] = text; }
function doCopy(key, btnEl) { copyText(_copyStore[key] || '', btnEl); }
function getOptionLabel(questionKey, value) {
  var question = QUESTIONS.find(function(q) { return q.key === questionKey; });
  if (!question) return value;
  var opt = question.options.find(function(item) { return item.value === value; });
  return opt ? opt.label : value;
}

// ============================================================
// RENDER: Quiz
// ============================================================
function startQuiz() {
  state.page = 'quiz'; state.currentQ = 0; state.answers = {}; state.version = 0; state.prevHash = null;
  renderQuiz();
}

function renderQuiz() {
  var q = QUESTIONS[state.currentQ];
  var progress = (state.currentQ / QUESTIONS.length) * 100;
  var selected = state.answers[q.key] || null;
  var html = '<div class="fade-in"><div class="header" style="padding-bottom:16px"><p class="sub" style="margin-bottom:4px">闪电狗AI快聘</p><h1>拍摄任务生成器</h1></div><div class="card">';
  html += '<div class="progress-bar"><div class="progress-fill" style="width:' + progress + '%"></div></div>';
  html += '<div class="q-step">' + q.step + '</div>';
  html += '<div class="q-title">' + q.title + '</div>';
  q.options.forEach(function(opt) {
    html += '<button class="option ' + (selected === opt.value ? 'selected' : '') + '" onclick="selectOption(\'' + q.key + '\', \'' + opt.value + '\')">';
    html += '<div class="opt-label">' + opt.label + '</div><div class="opt-desc">' + opt.desc + '</div></button>';
  });
  html += '</div><div style="display:flex;gap:8px;margin-top:12px">';
  if (state.currentQ > 0) html += '<button class="btn btn-ghost" style="flex:1" onclick="prevQuestion()">上一题</button>';
  html += '<button class="btn btn-ghost" style="flex:1" onclick="renderIntro()">返回首页</button>';
  html += '</div></div>';
  app.innerHTML = html;
}

function selectOption(key, value) {
  state.answers[key] = value;
  setTimeout(function() {
    if (state.currentQ < QUESTIONS.length - 1) { state.currentQ++; renderQuiz(); }
    else {
      state.version = 1;
      state.card = generateTaskCard(state.answers, null);
      state.prevHash = hashCard(state.card);
      state.page = 'result';
      renderResult();
    }
  }, 200);
}

function prevQuestion() { if (state.currentQ > 0) { state.currentQ--; renderQuiz(); } }

// ============================================================
// RENDER: Result page
// ============================================================

  var c = state.card;

  storeCopy('script', v.script.join('\n\n'));

  html += '<div class="header"><h1>你的拍摄任务卡 <span class="version-tag">第' + state.version + '版</span></h1><p class="sub">根据你的选择随机生成</p></div>';

  // 1. Summary
  html += '<div class="card"><div class="result-section">';
  html += '<div class="section-label">这条视频拍什么</div>';
  html += '<div class="section-content">' + v.summary + '</div>';
  html += '</div></div>';

  // 2. Recommended duration
  html += '<div class="card"><div class="result-section">';
  html += '<div class="section-label">建议时长</div>';
  html += '<div class="section-content">' + v.recommended_duration + '</div>';
  html += '</div></div>';

  // 3. Opening
  html += '<div class="card"><div class="result-section">';
  html += '<div class="section-label">开头怎么说</div><div class="section-content">';
  html += '<div style="font-size:12px;color:#888;margin-bottom:8px">只用来拍前3秒，选一句最顺口的先说。</div>';
  v.opening.forEach(function(s, i) { html += '<div style="margin-bottom:6px">' + (i+1) + '. ' + s + '</div>'; });
  html += '</div><div class="btn-row"><button class="btn-sm" onclick="doCopy(\'opening\', this)">复制开头</button></div>';

  // 4. Script
  html += '<div class="card"><div class="result-section">';
  html += '<div style="font-size:12px;color:#888;margin-bottom:8px">从开头后面继续往下讲，不再重复第一句。</div>';
  html += '<div class="section-label">正文怎么讲（' + c.script_mode + '）</div><div class="section-content">';
  v.script.forEach(function(s) {
    html += '<div style="margin-bottom:12px;padding:10px;background:#fafafa;border-radius:10px;font-size:13px;line-height:1.7">' + escapeHtml(s) + '</div>';
  });
  html += '</div><div class="btn-row"><button class="btn-sm" onclick="doCopy(\'script\', this)">复制脚本</button></div>';
  html += '</div></div>';

  // 5. Shots
  html += '<div class="card"><div class="result-section">';
  html += '<div class="section-label">拍哪几个镜头</div><div class="section-content"><ul>';
  v.shots.forEach(function(s) { html += '<li>' + s + '</li>'; });

  // 6. Titles
  html += '<div class="card"><div class="result-section">';
  html += '<div class="section-label">标题怎么写（3个备选）</div>';
  v.titles.forEach(function(t, i) {
    html += '<div class="title-item"><div class="title-text">';
    if (i === 0) html += '<span class="title-tag">推荐</span> ';
    html += t + '</div><button class="btn-sm" onclick="doCopy(\'title_' + i + '\', this)">复制</button></div>';
  });

  // 7. Topic tags
  html += '<div class="card"><div class="result-section">';
  html += '<div class="section-label">话题引用</div>';

function copyFullCard() {
  var c = state.card;

  var text = '【拍摄任务卡】第' + state.version + '版\n\n' +
    '视频类型：' + c.video_type + '\n重点卖点：' + c.main_point + '\n拍摄方式：' + getOptionLabel('shoot_mode', c.shoot_mode) + '\n脚本模式：' + c.script_mode + '\n建议时长：' + v.recommended_duration + '\n\n' +
    '【这条视频拍什么】\n' + v.summary + '\n\n' +
    '【开头怎么说】\n' + v.opening.map(function(s,i){return (i+1)+'. '+s;}).join('\n') + '\n\n' +
    '【正文怎么讲（' + c.script_mode + '）】\n' + v.script.join('\n\n') + '\n\n' +
    '【拍哪几个镜头】\n' + v.shots.map(function(s,i){return (i+1)+'. '+s;}).join('\n') + '\n\n' +
    '【标题怎么写】\n' + v.titles.map(function(t,i){return (i+1)+'. '+(i===0?'(推荐) ':'')+t;}).join('\n') + '\n\n' +
    '【话题引用】\n' + getTopicTagsText() + '\n\n' +
    '【评论区问什么】\n' + v.comment_questions.map(function(q,i){return (i+1)+'. '+q;}).join('\n') + '\n\n' +
    '【别人问了怎么回】\n' + v.comment_replies.map(function(r,i){return (i+1)+'. '+r;}).join('\n');
  copyText(text);
}

function regenerate() {
  state.version++;
  var prev = state.prevHash;
  state.card = generateTaskCard(state.answers, prev);
  state.prevHash = hashCard(state.card);
  renderResult();
  toast('已生成第' + state.version + '版');
}

renderIntro();
